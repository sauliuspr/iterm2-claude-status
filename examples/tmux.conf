# tmux configuration for Claude Code status display
# Add this to your ~/.tmux.conf

# Enable status bar
set -g status on
set -g status-interval 2  # Refresh every 2 seconds

# Status bar colors
set -g status-style "bg=#1e1e1e,fg=#d4d4d4"

# Left side - session name
set -g status-left "#[fg=#61afef] #S #[fg=#d4d4d4]"
set -g status-left-length 20

# Right side - Claude status (customize path as needed)
set -g status-right "#[fg=#98c379]#{?client_prefix,#[fg=#e06c75]C-Space,} #[fg=#d4d4d4]#(~/iterm2-claude-status/scripts/claude_status.sh) #[fg=#56b6c2]%H:%M"
set -g status-right-length 80

# Center - window list
set -g window-status-current-format "#[fg=#61afef,bold]#I:#W"
set -g window-status-format "#[fg=#6f7279]#I:#W"

# Optional: Show claude status only in right pane
# set -g status-right "#[fg=#d4d4d4]#(~/iterm2-claude-status/scripts/claude_status.sh --format=compact --no-emoji) #[fg=#56b6c2]%H:%M"
